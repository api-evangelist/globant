meters:
  - name: ai_pods
    description: Active AI Pods engaged on output-based delivery
    unit: pod-month
    aggregation: max
  - name: consultant_hours
    description: Time-and-materials consultant hours billed
    unit: hour
    aggregation: sum
    dimensions:
      - role
      - region
  - name: fixed_bid_milestones
    description: Fixed-bid project milestones invoiced
    unit: milestone
    aggregation: count
principles:
  - name: Visibility
    description: Track Globant invoices, pod outputs, and time-tracking exports against engagement budget.
  - name: Allocation
    description: Allocate Globant cost to the consuming initiative / business unit; AI Pods to specific
      product squads.
  - name: Optimization
    description: Negotiate pod-output SLAs; transition repeatable work from time-and-materials to fixed-bid;
      ensure early-engagement scope clarity.
  - name: Accountability
    description: Engagement sponsor owns Globant spend; finance reviews monthly invoice variance.
